name: Deploy to Oracle Cloud

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/stock-market-predictor
            sudo chown -R $(whoami):$(whoami) /home/ubuntu/stock-market-predictor
            git config --global --add safe.directory /home/ubuntu/stock-market-predictor
            git pull origin main
            sudo systemctl restart forecaster