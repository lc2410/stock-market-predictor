name: Full CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Check for Python Vulnerabilities
        run: |
          pip install safety
          safety check -r backend/requirements.txt
          
      - name: Check for NPM Vulnerabilities
        run: |
          cd frontend
          npm install --package-lock-only
          npm audit --audit-level=high

  lint:
    name: Code Linting
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Flake8
        run: pip install flake8
      - name: Run Python Linter
        run: flake8 backend/ app.py --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install NPM Dependencies
        run: cd frontend && npm install
      - name: Run JS Linter
        run: cd frontend && npm run lint:js

  test-backend:
    name: Backend Tests & Coverage
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install Dependencies
        run: pip install -r backend/requirements.txt
        
      - name: Run Pytest Suite
        run: PYTHONPATH=. python -m pytest backend/tests/ --cov=. --cov-report=xml
        
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  test-frontend:
    name: Frontend Tests
    needs: [security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      
      - name: Install Python Dependencies
        run: pip install -r backend/requirements.txt
      - name: Install NPM Dependencies & Browsers
        run: |
          cd frontend
          npm install
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          npx playwright install --with-deps
          
      - name: Boot Flask Backend
        run: |
          export PYTHONPATH=.
          nohup python app.py > app.log 2>&1 &
          for i in {1..30}; do
            curl -s http://127.0.0.1:5001 > /dev/null && echo "Server is up!" && break
            echo "Waiting for server to boot... ($i/30)"
            sleep 2
          done
          
      - name: Run Playwright Tests
        run: |
          cd frontend
          npm run test:frontend
        
      - name: Upload Playwright Report
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  sonarcloud:
    name: Static Code Analysis
    needs: [test-backend, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml

  deploy:
    name: Deploy to Production
    needs: [lint, test-backend, test-frontend, sonarcloud, security-scan]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/ubuntu/stock-market-predictor
            sudo chown -R $(whoami):$(whoami) /home/ubuntu/stock-market-predictor
            git config --global --add safe.directory /home/ubuntu/stock-market-predictor
            git pull origin main
            source venv/bin/activate
            pip install -r backend/requirements.txt
            sudo systemctl restart forecaster  
            sleep 10
            curl --fail http://localhost/ || (git reset --hard HEAD~1 && sudo systemctl restart forecaster && exit 1)