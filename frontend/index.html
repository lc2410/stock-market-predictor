<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock & Dividend Forecaster</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header-container">
            <div>
                <h1>Stock & Dividend Forecaster</h1>
                <p>Enter a U.S. stock ticker symbol to get the next-day forecast.</p>
            </div>
            <button id="themeToggle" class="theme-btn" title="Toggle Theme">
                <span class="theme-icon">🌙</span>
                <span class="theme-label">Dark</span>
            </button>
        </div>
        <div class="input-group">
            <div class="input-wrapper">
                <input type="text" id="tickerInput" placeholder="e.g., AAPL, VOO, MSFT" autofocus autocomplete="off">
                <span id="clearSearchBtn" title="Clear search">&times;</span>
                <div id="autocompleteResults" class="autocomplete-items"></div>
            </div>
            <button id="predictBtn">Get Forecast</button>
        </div>
        
        <div id="loader" class="loader-container">
            <div class="loader"></div>
            <div class="loader-text">Fetching prediction data...</div>
        </div>
        
        <div id="resultContainer"></div>
        <div id="errorContainer" class="error-message"></div>
    </div>
    <script src="{{ url_for('static', filename='scripts/main.js') }}"></script>
</body>
</html>
